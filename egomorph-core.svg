<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-labelledby="title desc">
  <title id="title">Egomorph Core</title>
  <desc id="desc">Abstraktes Core-Symbol mit der Wortmarke Egomorph Core</desc>
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#46c7d8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(18 18)">
    <circle cx="82" cy="82" r="64" fill="#081013" stroke="url(#core)" stroke-width="5"/>
    <path d="M82 34 123 58v48l-41 24-41-24V58z" fill="none" stroke="url(#core)" stroke-width="7" stroke-linejoin="round"/>
    <circle cx="82" cy="82" r="18" fill="url(#core)" filter="url(#glow)"/>
    <path d="M82 34v30M123 58 97 73M123 106 97 91M82 130v-30M41 106l26-15M41 58l26 15" stroke="#dffcff" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g fill="#eef7f7" font-family="system-ui,-apple-system,Segoe UI,sans-serif">
    <text x="180" y="94" font-size="58" font-weight="650" letter-spacing="1">Egomorph</text>
    <text x="183" y="144" font-size="35" font-weight="700" letter-spacing="12" fill="#46c7d8">CORE</text>
  </g>
</svg>
